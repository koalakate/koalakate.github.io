name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Build under the /preview GitHub Pages subpath. (Was /antares-preview,
      # but GitHub Pages pinned that path's index.html to a stale artifact and
      # would not release it; a fresh path avoids the stuck cache.)
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /preview
      # Next's static export keeps files at out/ root; nest them under preview/
      # so the artifact serves at /preview/, and add a root redirect so the bare
      # domain forwards there instead of 404ing.
      - name: Assemble site
        run: |
          mkdir -p site/preview
          cp -r out/. site/preview/
          cat > site/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./preview/">
          <title>Antares</title>
          <a href="./preview/">Continue to the Antares preview →</a>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
