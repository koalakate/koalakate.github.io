name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Build under the /antares-preview GitHub Pages subpath.
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /antares-preview
      # Next's static export keeps files at out/ root; nest them under
      # antares-preview/ so the artifact serves at /antares-preview/, and add a
      # root redirect so the bare domain forwards there instead of 404ing.
      - name: Assemble site
        run: |
          mkdir -p site/antares-preview
          cp -r out/. site/antares-preview/
          cat > site/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./antares-preview/">
          <title>Antares</title>
          <a href="./antares-preview/">Continue to the Antares preview →</a>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
